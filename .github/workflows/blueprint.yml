name: Blueprint (Verso)

# Builds the Verso blueprint in blueprint-verso/ and deploys it to GitHub Pages.
# (Replaces the old leanblueprint LaTeX pipeline, which built the whole project.)

on:
  push:
    branches: [main]
    paths:
      - 'blueprint-verso/**'
      - '.github/workflows/blueprint.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build blueprint site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: blueprint-verso/.lake/packages
          key: verso-lake-${{ hashFiles('blueprint-verso/lake-manifest.json', 'blueprint-verso/lean-toolchain') }}
          restore-keys: verso-lake-
      - name: Build and render the blueprint
        working-directory: blueprint-verso
        run: ./scripts/ci-pages.sh
      - uses: actions/upload-pages-artifact@v3
        with:
          path: blueprint-verso/_out/site/html-multi

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
